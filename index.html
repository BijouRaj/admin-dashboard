<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <!-- sidebar -->
        <div class="sidebar">
            <div class="side-head">
                <side-head-text>Dashboard</side-head-text>
                <img src="icons/view-dashboard.svg" alt="dash" id="dash">
            </div>
            <ul class="side-items">
                <div class="side-options">
                    <div class="side-item">
                        <li>Home</li>
                        <img src="icons/home-account.svg" alt="home-icon">
                        
                    </div>
                    <div class="side-item">
                        <li>Profile</li>
                        <img src="icons/face-man.svg" alt="person">
                    </div>
                    <div class="side-item">
                        <li>Messages</li>
                        <img src="icons/message-outline.svg" alt="messages">
                    </div>
                    <div class="side-item">
                        <li>History</li>
                        <img src="icons/clock.svg" alt="clock">
                    </div>
                    <div class="side-item">
                        <li>Tasks</li>
                        <img src="icons/file-tree.svg" alt="tasks">
                    </div>
                    <div class="side-item">
                        <li>Communities</li>
                        <img src="icons/account-group.svg" alt="community">
                    </div>
                </div>

                <div class="side-settings">
                    <div class="side-item">
                        <li>Settings</li>
                        <img src="icons/cog.svg" alt="cog">
                    </div>
                    <div class="side-item">
                        <li>Support</li>
                        <img src="icons/head-question-outline.svg" alt="question">
                    </div>
                    <div class="side-item">
                        <li>Privacy</li>
                        <img src="icons/plus-lock.svg" alt="lock">
                    </div>
                </div>
            </ul>


        </div>


        <!-- header -->
        <div class="header">
            <div class="header-banner">
                <div class="search-bar">
                    <img src="icons/search.svg" alt="search" id="search">
                    <search>
                    <form id=searchForm class="search-container">
                        <input
                            type="search"
                            id="searchInput"
                            placeholder="Search for something..."
                            aria-label="Search website content"
                            required
                            />
                    </form>
                                </search>
                </div>
            <div class="header-banner-corner">
                <img src="icons/alarm-light-outline.svg" alt="alarm" id="alarm">
                
                    <div class="header-banner-name">Morgan Oakley</div>
            </div>
            </div>


            <div class="header-options">
                <div class="header-greeting">
                    <div class="hello">Hi there,</div>
                    <div class="morgan">Morgan Oakley (@morgan)</div>
                </div>
                <div class="buttons">
                    <button>New</button>
                    <button>Upload</button>
                    <button>Share</button>
                </div>
            </div>
        </div>


        <!-- main -->
        <div class="main-content">
            <div class="projects">

            </div>
            <div class="announcements">

            </div>
            <div class="trending">

            </div>
        </div>


    </div>
</body>
</html>
